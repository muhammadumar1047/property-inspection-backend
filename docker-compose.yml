version: "3.9"

services:
  # PostgreSQL database
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: property_db
    ports:
      - "5433:5432"  
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d property_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # .NET 8 Web API backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: property-inspection-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:5000
      # Use container name "postgres" as host
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5433;Database=property_db;Username=postgres;Password=postgres
    ports:
      - "5000:5000"

volumes:
  # Persistent database storage
  pgdata:
